<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <title>DYMO Print Station</title>
</head>
<body>

<button onclick="testPrint()">TEST PRINT</button>

<script>
async function testPrint() {

  const labelXml = `
  <DieCutLabel Version="8.0" Units="twips">
    <PaperOrientation>Landscape</PaperOrientation>
    <Id>Address</Id>
    <PaperName>99010 Standard Address</PaperName>

    <ObjectInfo>
      <TextObject>
        <Name>TEXT</Name>
        <ForeColor Alpha="255" Red="0" Green="0" Blue="0"/>
        <BackColor Alpha="0" Red="255" Green="255" Blue="255"/>
        <StyledText>
          <Element>
            <String>KG Family Foods</String>
            <Attributes>
              <Font Family="Arial" Size="18" Bold="True"/>
            </Attributes>
          </Element>
        </StyledText>
      </TextObject>
    </ObjectInfo>

  </DieCutLabel>`;

  try {
    const res = await fetch("http://localhost:41951/dcd/api/print-label", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        labelXml: labelXml,
        printerName: ""   // αφήνεις κενό = default printer
      })
    });

    console.log(await res.json());

  } catch (err) {
    console.error(err);
    alert("Print Failed");
  }
}
</script>

</body>
</html>
