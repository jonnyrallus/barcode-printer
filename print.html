<!doctype html>
<html lang="el">
<head>
<meta charset="utf-8">
<title>KG Family Foods — DYMO 450 Print Station</title>

<!-- DYMO Label Framework (required for 450 Turbo) -->
<script src="http://localhost:41951/DYMO/DYMO.Label.Framework.latest.js"></script>

<style>
body{font-family:Arial;margin:30px;}
button{padding:10px 15px;font-weight:bold;}
</style>
</head>

<body>

<h2>DYMO 450 Turbo Print Station</h2>
<button onclick="testPrint()">TEST PRINT</button>

<script>

function testPrint(){

  if (!window.dymo || !dymo.label || !dymo.label.framework){
    alert("DYMO Framework not loaded");
    return;
  }

  const printers = dymo.label.framework.getPrinters();
  if (!printers.length){
    alert("No DYMO printers found");
    return;
  }

  const printerName = printers.find(p => 
    p.name.toLowerCase().includes("450")
  )?.name || printers[0].name;

  console.log("Using printer:", printerName);

  const labelXml = `
  <DieCutLabel Version="8.0" Units="twips">
    <PaperOrientation>Landscape</PaperOrientation>
    <Id>Address</Id>
    <PaperName>99010 Standard Address</PaperName>

    <ObjectInfo>
      <TextObject>
        <Name>TEXT</Name>
        <StyledText>
          <Element>
            <String>KG Family Foods</String>
            <Attributes>
              <Font Family="Arial" Size="18" Bold="True"/>
            </Attributes>
          </Element>
        </StyledText>
      </TextObject>
    </ObjectInfo>

  </DieCutLabel>
  `;

  const label = dymo.label.framework.openLabelXml(labelXml);
  label.print(printerName);

  alert("Print sent to: " + printerName);
}

</script>

</body>
</html>
